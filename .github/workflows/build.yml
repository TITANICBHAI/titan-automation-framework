name: Build & Release APK

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main ]

# Cancel any in-progress run on the same branch so storage isn't wasted
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Source ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. JDK ───────────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      # ── 3. Android SDK ───────────────────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # ── 4. NDK (required for titan_jni.cpp → titan_jni.so) ──────────────────
      - name: Install NDK r26
        run: |
          echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "ndk;26.3.11579264" \
            "cmake;3.22.1" \
            --sdk_root=$ANDROID_SDK_ROOT

      # ── 5. Gradle cache ──────────────────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.android/build-cache
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # ── 6. OpenCV ─────────────────────────────────────────────────────────────
      # The local opencv.aar is NOT committed (it's 35 MB; see README).
      # build.gradle.kts automatically falls back to org.opencv:opencv:4.9.0
      # from Maven Central when the local file is absent — no manual step needed.
      - name: Confirm OpenCV fallback is active
        working-directory: titan-automation
        run: |
          if [ -f "app/libs/opencv.aar" ]; then
            echo "✔ Local opencv.aar found — using bundled library"
          else
            echo "ℹ No local opencv.aar — build.gradle.kts will use org.opencv:opencv:4.9.0 from Maven Central"
          fi

      # ── 7. Gradle wrapper permissions ────────────────────────────────────────
      - name: Grant execute permission to gradlew
        working-directory: titan-automation
        run: chmod +x gradlew

      # ── 8. Build ─────────────────────────────────────────────────────────────
      - name: Build Debug APK
        working-directory: titan-automation
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}

      # ── 9. Collect APK info ───────────────────────────────────────────────────
      - name: Locate APK
        id: apk
        working-directory: titan-automation
        run: |
          APK=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
          echo "path=$APK" >> $GITHUB_OUTPUT
          SIZE=$(du -sh "$APK" | cut -f1)
          echo "size=$SIZE" >> $GITHUB_OUTPUT
          echo "Built APK: $APK ($SIZE)"

      # ── 10. Upload artifact (available on every branch for 30 days) ───────────
      - name: Upload Debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: titan-automation-debug-${{ github.sha }}
          path: titan-automation/${{ steps.apk.outputs.path }}
          retention-days: 30
          if-no-files-found: error

      # ── 11. Build summary ─────────────────────────────────────────────────────
      - name: Write build summary
        run: |
          echo "## 🤖 TITAN Automation — Debug Build" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| APK size | ${{ steps.apk.outputs.size }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Artifact | \`titan-automation-debug-${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download the APK from the **Artifacts** section of this run." >> $GITHUB_STEP_SUMMARY

  # ── Release job — runs only on main ─────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download APK from build job
        uses: actions/download-artifact@v4
        with:
          name: titan-automation-debug-${{ github.sha }}
          path: dist/

      - name: Generate version tag
        id: tag
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          DATE="$(date -u +'%Y%m%d')"
          echo "name=debug-${DATE}-${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "title=Debug Build ${DATE} (${SHORT_SHA})" >> $GITHUB_OUTPUT

      - name: Rename APK for release
        run: |
          APK=$(find dist/ -name "*.apk" | head -1)
          mv "$APK" "dist/titan-automation-debug-${{ steps.tag.outputs.name }}.apk"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.title }}
          draft: false
          prerelease: true
          generate_release_notes: true
          body: |
            ## 🤖 TITAN Automation Framework — Debug APK

            **Commit:** `${{ github.sha }}`
            **Branch:** `main`
            **Built:** ${{ github.run_id }}

            ### ⚠️ This is a debug build
            - Signed with the debug keystore — **not for production**
            - ApplicationId suffix: `com.titan.automation.debug`
            - For a release APK set `KEYSTORE_PATH`, `KEYSTORE_PASSWORD`, `KEY_ALIAS`, `KEY_PASSWORD` secrets

            ### 📱 Install
            ```bash
            adb install -r titan-automation-debug-*.apk
            ```

            ### ✅ First-time setup
            After install, the app will walk you through:
            1. Enable Accessibility Service
            2. Grant Display Over Other Apps
            3. Grant Screen Capture (Android 10 only)

            ### 🔧 OpenCV note
            This CI build links against `org.opencv:opencv:4.9.0` (Maven Central).
            For optimal native performance, replace with the local AAR — see README.
          files: dist/titan-automation-debug-*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
